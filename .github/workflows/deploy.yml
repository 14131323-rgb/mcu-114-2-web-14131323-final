name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ✨ 修正 1：指定 Angular 打包時，直接將檔案吐在 output 資料夾，不產生多餘的主目錄
      - name: Build Angular Application
        run: npx ng build --configuration production --base-href /mcu-114-2-web-14131323-final/ --output-path=dist/output

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # ✨ 修正 2：直接抓取 output，這樣 index.html 就會完美待在 GitHub Pages 的根目錄，消除 404！
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/output/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
